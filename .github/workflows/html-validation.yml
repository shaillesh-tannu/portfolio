name: HTML Validation

on:
  pull_request:
    paths:
      - '**.html'
      - '.github/workflows/html-validation.yml'
  push:
    branches:
      - main
    paths:
      - '**.html'

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install html5validator
        run: pip install --upgrade html5validator

      - name: Validate HTML files
        run: html5validator --root . --also-check-css --show-warnings
